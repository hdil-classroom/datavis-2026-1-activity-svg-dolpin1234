<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		#header-title {
			font-size: 24px;
		}

		#visualization-activity {
			width: 800px;
			height: 600px;
		}

		/* YOUR CSS CODE WILL GO HERE */


	</style>
</head>

<body>
	<h1 id="header-title">
		In-Class Acitivity by REPLACE_WITH_YOUR_NAME
	</h1>

	<svg id="visualization-activity" width="800" height="600">
		<line x1="70" y1="50" x2="70" y2="500" stroke="black" stroke-width="2"/>
		<line x1="70" y1="500" x2="770" y2="500" stroke="black" stroke-width="2"/>
		<text transform="translate(380,280)" x="40" y="260" text-anchor="middle">Station Name</text>
		<text transform="translate(20,300) rotate(-90)" text-anchor="middle">Entry Count</text>
		<g class="axis" transform="translate(20,0)">
			<line x1="35" y1="100" x2="50" y2="100" stroke="black" stroke-width="1"/>
			<line x1="35" y1="150" x2="50" y2="150" stroke="black" stroke-width="1"/>
			<line x1="35" y1="200" x2="50" y2="200" stroke="black" stroke-width="1"/>
			<line x1="35" y1="250" x2="50" y2="250" stroke="black" stroke-width="1"/>
			<line x1="35" y1="300" x2="50" y2="300" stroke="black" stroke-width="1"/>
			<line x1="35" y1="350" x2="50" y2="350" stroke="black" stroke-width="1"/>
			<line x1="35" y1="400" x2="50" y2="400" stroke="black" stroke-width="1"/>
			<line x1="35" y1="450" x2="50" y2="450" stroke="black" stroke-width="1"/>
			<line x1="35" y1="500" x2="50" y2="500" stroke="black" stroke-width="1"/>
			<text x="35" y="100" text-anchor="end" font-size="10">80000</text>
			<text x="35" y="150" text-anchor="end"font-size="10">70000</text>
			<text x="35" y="200" text-anchor="end"font-size="10">60000</text>
			<text x="35" y="250" text-anchor="end"font-size="10">50000</text>
			<text x="35" y="300" text-anchor="end"font-size="10">40000</text>
			<text x="35" y="350" text-anchor="end"font-size="10">30000</text>
			<text x="35" y="400" text-anchor="end"font-size="10">20000</text>
			<text x="35" y="450" text-anchor="end"font-size="10">10000</text>
			<text x="35" y="500" text-anchor="end"font-size="10">0</text>

		</g>
		<g class="bar-with-count" transform="translate(80,100)">
			<rect x="0" y="0" width="80" height="400" fill="green" />
			<text x="40" y="420" text-anchor="middle">홍대</text>
		</g>
		<g class="bar-with-count" transform="translate(200,150)">
			<rect x="0" y="0" width="80" height="350" fill="green" />
			<text x="40" y="370" text-anchor="middle">잠실(송파구청)</text>
		</g>
		<g class="bar-with-count" transform="translate(320,210)">
			<rect x="0" y="0" width="80" height="290" fill="orange" />
			<text x="40" y="310" text-anchor="middle">고속버스터미널</text>
		</g>
		<g class="bar-with-count" transform="translate(440,280)">
			<rect x="0" y="0" width="80" height="220" fill="blue" />
			<text x="40" y="240" text-anchor="middle">서울역</text>
		</g>
		<g class="bar-with-count" transform="translate(560,290)">
			<rect x="0" y="0" width="80" height="210" fill="green" />
			<text x="40" y="230" text-anchor="middle">신림</text>
		</g>
		<g class="bar-with-count" transform="translate(680,300)">
			<rect x="0" y="0" width="80" height="200" fill="green" />
			<text x="40" y="220" text-anchor="middle">신도림</text>
		</g>
		<g class="category" transform="translate(720,40)">
			<rect x="0" y="0" width="10" height="10" fill="blue" />
			<text x="20" y="8" font-size="10">Line 1</text>
			<rect x="0" y="20" width="10" height="10" fill="green" />
			<text x="20" y="28" font-size="10">Line 2</text>
			<rect x="0" y="40" width="10" height="10" fill="orange" />
			<text x="20" y="48" font-size="10">Line 3</text>
		</g>

	</svg>

</body>
</html>
